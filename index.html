<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Surprise trip</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="tulip-garden"></div>

    <main class="page">
      <h1>A surprise is coming…</h1>
      <p class="subtitle">
        Something special is coming soon.
      </p>

      <section class="block">
        <h2>Countdown</h2>
        <div id="countdown">
          <div class="countdown-item">
            <span class="count-number" id="days">0</span>
            <span class="count-label">days</span>
          </div>
          <div class="countdown-item">
            <span class="count-number" id="hours">00</span>
            <span class="count-label">hours</span>
          </div>
          <div class="countdown-item">
            <span class="count-number" id="minutes">00</span>
            <span class="count-label">minutes</span>
          </div>
          <div class="countdown-item">
            <span class="count-number" id="seconds">00</span>
            <span class="count-label">seconds</span>
          </div>
        </div>
        <p id="countdown-message"></p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
